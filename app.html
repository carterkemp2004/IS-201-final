<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Snake Game | Carter Kemp</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        #game-board { border: 5px solid #004b87; background-color: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .score-board { font-size: 2rem; color: #004b87; margin-bottom: 10px; font-weight: bold; }
        .controls { margin-top: 20px; }
        a { text-decoration: none; color: #ff6600; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="score-board">Score: <span id="score">0</span></div>
    <canvas id="game-board" width="400" height="400"></canvas>
    
    <div class="controls">
        <button onclick="location.reload()">Reset Game</button>
    </div>

    <a href="scratch.html">← Back to Scratch Page</a>

    <script>
        const canvas = document.getElementById("game-board");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        let score = 0;
        let dx = 20;
        let dy = 0;
        let snake = [{x: 160, y: 160}, {x: 140, y: 160}, {x: 120, y: 160}];
        let foodX, foodY;

        function main() {
            if (didGameEnd()) return alert("Game Over! Score: " + score);
            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, 100);
        }

        function clearCanvas() { ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height); }
        function drawSnake() { snake.forEach(part => { ctx.fillStyle = "#2ecc71"; ctx.fillRect(part.x, part.y, 18, 18); }); }
        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            if (snake[0].x === foodX && snake[0].y === foodY) {
                score += 10;
                scoreElement.innerHTML = score;
                createFood();
            } else { snake.pop(); }
        }

        function didGameEnd() {
            for (let i = 4; i < snake.length; i++) if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            return snake[0].x < 0 || snake[0].x > canvas.width - 20 || snake[0].y < 0 || snake[0].y > canvas.height - 20;
        }

        function createFood() {
            foodX = Math.round((Math.random() * (canvas.width-20)) / 20) * 20;
            foodY = Math.round((Math.random() * (canvas.height-20)) / 20) * 20;
        }

        function drawFood() { ctx.fillStyle = "#ff6600"; ctx.fillRect(foodX, foodY, 18, 18); }

        document.addEventListener("keydown", event => {
            const keyPressed = event.keyCode;
            if (keyPressed === 37 && dx === 0) { dx = -20; dy = 0; }
            if (keyPressed === 38 && dy === 0) { dx = 0; dy = -20; }
            if (keyPressed === 39 && dx === 0) { dx = 20; dy = 0; }
            if (keyPressed === 40 && dy === 0) { dx = 0; dy = 20; }
        });

        createFood();
        main();
    </script>
</body>
</html>
